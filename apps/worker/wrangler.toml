name = "linkora-worker"
main = "src/index.ts"
compatibility_date = "2024-07-01"
compatibility_flags = ["nodejs_compat"]
routes = [
  { pattern = "go.y8o.de", custom_domain = true }
]

[vars]
LINKORA_VERSION = "0.1.0"

[[d1_databases]]
binding = "DB"
database_name = "linkora-db"
database_id = "13498e76-9509-417f-bd2d-f0cc00cb4bce"
migrations_dir = "../../migrations"

[[kv_namespaces]]
binding = "KV"
id = "dd9c01217d07484db6fb702ada681527"
preview_id = "40c763773cfb4565b0b45749c325f888"

[[r2_buckets]]
binding = "BACKUPS"
bucket_name = "linkora-backups"
preview_bucket_name = "linkora-backups-dev"

[triggers]
# Cloudflare cron uses UTC. 18:00 UTC runs at 02:00 Asia/Shanghai.
crons = ["0 18 * * *"]

# Secrets (set via: wrangler secret put ADMIN_TOKEN)
# ADMIN_TOKEN = set via wrangler secret
