name = "linkora-worker"
main = "src/index.ts"
compatibility_date = "2024-07-01"
compatibility_flags = ["nodejs_compat"]

[vars]
LINKORA_VERSION = "0.1.0"

# D1 Database - replace database_id after running: wrangler d1 create linkora-db
[[d1_databases]]
binding = "DB"
database_name = "linkora-db"
database_id = "YOUR_D1_DATABASE_ID"
migrations_dir = "../../migrations"

# KV Namespace - replace id after running: wrangler kv namespace create LINKORA_KV
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_PREVIEW_NAMESPACE_ID"

# Secrets (set via: wrangler secret put ADMIN_TOKEN)
# ADMIN_TOKEN = set via wrangler secret
