name = "linkora-worker"
main = "src/index.ts"
compatibility_date = "2024-07-01"
compatibility_flags = ["nodejs_compat"]

[vars]
LINKORA_VERSION = "0.1.0"
# Comma-separated list of origins allowed to call /api/* via CORS.
# Set to your admin frontend origin(s), e.g. "https://admin.example.com".
# Leave empty to reject cross-origin browser requests, or "*" to allow all.
CORS_ORIGINS = ""

# D1 Database - replace database_id after running: wrangler d1 create linkora-db
[[d1_databases]]
binding = "DB"
database_name = "linkora-db"
database_id = "YOUR_D1_DATABASE_ID"
migrations_dir = "../../migrations"

# KV Namespace - replace id after running: wrangler kv namespace create LINKORA_KV
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_PREVIEW_NAMESPACE_ID"

# Secrets (set via: wrangler secret put ADMIN_TOKEN)
# ADMIN_TOKEN = set via wrangler secret
# IP_HASH_SALT = set via wrangler secret put IP_HASH_SALT (salts visitor IP hashes)
