<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=0.28.8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon-light.svg?v=0.28.8"
      media="(prefers-color-scheme: light)"
    />
    <meta name="theme-color" content="#0f172a" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linketry Admin</title>
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('linketry_theme');
          const preference = stored === 'light' || stored === 'dark' ? stored : 'dark';
          const systemDark = matchMedia('(prefers-color-scheme: dark)').matches;
          const theme = preference === 'system' ? (systemDark ? 'dark' : 'light') : preference;
          document.documentElement.dataset.theme = theme;
          document.documentElement.dataset.themePreference = preference;
          document.documentElement.style.colorScheme = theme;
          document
            .querySelector('meta[name="theme-color"]')
            ?.setAttribute('content', theme === 'dark' ? '#0f172a' : '#f8fafc');
        } catch {
          document.documentElement.dataset.theme = 'dark';
          document.documentElement.dataset.themePreference = 'system';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
