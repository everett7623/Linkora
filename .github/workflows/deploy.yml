name: Deploy Linketry

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-linketry
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      LINKETRY_ADMIN_TOKEN_OVERRIDE: ${{ secrets.LINKETRY_ADMIN_TOKEN }}
      LINKETRY_ADMIN_URL: ${{ vars.LINKETRY_ADMIN_URL }}
      LINKETRY_ADMIN_ZONE: ${{ vars.LINKETRY_ADMIN_ZONE }}
      LINKETRY_API_URL: ${{ vars.LINKETRY_API_URL }}
      LINKETRY_PAGES_PROJECT: ${{ vars.LINKETRY_PAGES_PROJECT }}
      LINKETRY_WORKER_NAME: ${{ vars.LINKETRY_WORKER_NAME }}
      LINKETRY_WORKER_DOMAINS: ${{ vars.LINKETRY_WORKER_DOMAINS }}
      LINKETRY_SHORT_DOMAIN: ${{ vars.LINKETRY_SHORT_DOMAIN }}
      LINKETRY_COMPATIBILITY_DATE: ${{ vars.LINKETRY_COMPATIBILITY_DATE }}
      LINKETRY_D1_DATABASE_NAME: ${{ vars.LINKETRY_D1_DATABASE_NAME }}
      LINKETRY_D1_DATABASE_ID: ${{ vars.LINKETRY_D1_DATABASE_ID }}
      LINKETRY_KV_NAMESPACE_ID: ${{ vars.LINKETRY_KV_NAMESPACE_ID }}
      LINKETRY_KV_PREVIEW_ID: ${{ vars.LINKETRY_KV_PREVIEW_ID }}
      LINKETRY_R2_BUCKET: ${{ vars.LINKETRY_R2_BUCKET }}
      LINKETRY_R2_PREVIEW_BUCKET: ${{ vars.LINKETRY_R2_PREVIEW_BUCKET }}
      LINKETRY_VISITS_QUEUE: ${{ vars.LINKETRY_VISITS_QUEUE }}
      LINKETRY_DAILY_CRON: ${{ vars.LINKETRY_DAILY_CRON }}
      LINKETRY_HEALTH_CRON: ${{ vars.LINKETRY_HEALTH_CRON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Linketry version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "RESOLVED_LINKETRY_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"
          echo "Linketry version: $PACKAGE_VERSION"

      - name: Resolve Worker domains
        run: |
          RESOLVED_WORKER_DOMAINS="$(node <<'NODE'
          const source = process.env.LINKETRY_WORKER_DOMAINS || process.env.LINKETRY_SHORT_DOMAIN || '';
          const domains = [...new Set(source.split(',').map((value) => value.trim().toLowerCase()).filter(Boolean))];
          process.stdout.write(domains.join(','));
          NODE
          )"
          echo "RESOLVED_WORKER_DOMAINS=${RESOLVED_WORKER_DOMAINS}" >> "$GITHUB_ENV"

      - name: Type-check Worker
        run: npm run type-check --workspace=apps/worker

      - name: Test Admin unit rules
        run: npm run test:unit --workspace=apps/admin

      - name: Test Worker public pages and redirects
        run: npm run test --workspace=apps/worker

      - name: Build Admin
        run: npm run build --workspace=apps/admin
        env:
          VITE_LINKETRY_API_URL: ${{ env.LINKETRY_API_URL }}

      - name: Generate Worker config
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.LINKETRY_WORKER_NAME != '' && env.RESOLVED_WORKER_DOMAINS != '' && env.LINKETRY_D1_DATABASE_NAME != '' && env.LINKETRY_D1_DATABASE_ID != '' && env.LINKETRY_KV_NAMESPACE_ID != ''
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const env = process.env;
          const domains = env.RESOLVED_WORKER_DOMAINS.split(',').filter(Boolean);
          const routeLines = domains
            .map((domain) => `  { pattern = "${domain}", custom_domain = true }`)
            .join(',\n');
          const optionalConfig = [];
          if (env.LINKETRY_R2_BUCKET && env.LINKETRY_R2_PREVIEW_BUCKET) {
            optionalConfig.push(
              '[[r2_buckets]]',
              'binding = "BACKUPS"',
              `bucket_name = "${env.LINKETRY_R2_BUCKET}"`,
              `preview_bucket_name = "${env.LINKETRY_R2_PREVIEW_BUCKET}"`,
              ''
            );
          }
          if (env.LINKETRY_VISITS_QUEUE) {
            optionalConfig.push(
              '[[queues.producers]]',
              'binding = "VISITS_QUEUE"',
              `queue = "${env.LINKETRY_VISITS_QUEUE}"`,
              '',
              '[[queues.consumers]]',
              `queue = "${env.LINKETRY_VISITS_QUEUE}"`,
              'max_batch_size = 10',
              'max_batch_timeout = 5',
              ''
            );
          }
          const dailyCron = env.LINKETRY_DAILY_CRON || '0 18 * * *';
          const healthCron = env.LINKETRY_HEALTH_CRON || '0 * * * *';
          const cronList = [...new Set([dailyCron, healthCron])].map(JSON.stringify).join(', ');
          optionalConfig.push('[triggers]', `crons = [${cronList}]`, '');
          const kvNamespaces = [
            '[[kv_namespaces]]',
            'binding = "KV"',
            `id = "${env.LINKETRY_KV_NAMESPACE_ID}"`,
          ];
          if (env.LINKETRY_KV_PREVIEW_ID) {
            kvNamespaces.push(`preview_id = "${env.LINKETRY_KV_PREVIEW_ID}"`);
          }
          const config = [
            `name = "${env.LINKETRY_WORKER_NAME}"`,
            'main = "src/index.ts"',
            `compatibility_date = "${env.LINKETRY_COMPATIBILITY_DATE || '2026-07-08'}"`,
            'compatibility_flags = ["nodejs_compat"]',
            'routes = [',
            routeLines,
            ']',
            '',
            '[vars]',
            `LINKETRY_VERSION = "${env.RESOLVED_LINKETRY_VERSION || '0.11.0'}"`,
            `LINKETRY_DAILY_CRON = ${JSON.stringify(dailyCron)}`,
            `LINKETRY_HEALTH_CRON = ${JSON.stringify(healthCron)}`,
            '',
            '[[d1_databases]]',
            'binding = "DB"',
            `database_name = "${env.LINKETRY_D1_DATABASE_NAME}"`,
            `database_id = "${env.LINKETRY_D1_DATABASE_ID}"`,
            'migrations_dir = "../../migrations"',
            '',
            ...kvNamespaces,
            '',
            ...optionalConfig,
          ].join('\n');

          fs.writeFileSync('apps/worker/wrangler.toml', config);
          NODE

      - name: Ensure LINKETRY_ADMIN_TOKEN secret
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.LINKETRY_WORKER_NAME != ''
        run: |
          if [ -n "$LINKETRY_ADMIN_TOKEN_OVERRIDE" ]; then
            echo "Using LINKETRY_ADMIN_TOKEN from the optional recovery override in GitHub repository secrets."
            echo "LINKETRY_ADMIN_TOKEN_SOURCE=configured" >> "$GITHUB_ENV"
            printf '%s' "$LINKETRY_ADMIN_TOKEN_OVERRIDE" | npx wrangler secret put LINKETRY_ADMIN_TOKEN
          else
            EXISTING_SECRETS="$(npx wrangler secret list --name "$LINKETRY_WORKER_NAME" --format json 2>/dev/null || true)"
            if printf '%s' "$EXISTING_SECRETS" | grep -q '"name"[[:space:]]*:[[:space:]]*"LINKETRY_ADMIN_TOKEN"'; then
              echo "Existing Worker LINKETRY_ADMIN_TOKEN found; preserving it."
              echo "LINKETRY_ADMIN_TOKEN_SOURCE=preserved" >> "$GITHUB_ENV"
            else
              echo "No Worker admin token found; generating one for the first deployment."
              GENERATED_TOKEN="linketry_$(openssl rand -hex 32)"
              echo "LINKETRY_ADMIN_TOKEN_SOURCE=generated" >> "$GITHUB_ENV"
              printf '%s' "$GENERATED_TOKEN" | npx wrangler secret put LINKETRY_ADMIN_TOKEN
              echo ""
              echo "============================================================"
              echo "Generated LINKETRY_ADMIN_TOKEN: $GENERATED_TOKEN"
              echo "============================================================"
              echo "This value is shown only in this first-deployment log."
              echo "Save it in a password manager. Later deployments preserve the Worker secret."
              echo ""
            fi
          fi
        working-directory: apps/worker

      - name: Apply D1 migrations
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.LINKETRY_WORKER_NAME != '' && env.RESOLVED_WORKER_DOMAINS != '' && env.LINKETRY_D1_DATABASE_NAME != '' && env.LINKETRY_D1_DATABASE_ID != '' && env.LINKETRY_KV_NAMESPACE_ID != ''
        run: npx wrangler d1 migrations apply "$LINKETRY_D1_DATABASE_NAME" --remote
        working-directory: apps/worker

      - name: Deploy Worker
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.LINKETRY_WORKER_NAME != '' && env.RESOLVED_WORKER_DOMAINS != '' && env.LINKETRY_D1_DATABASE_NAME != '' && env.LINKETRY_D1_DATABASE_ID != '' && env.LINKETRY_KV_NAMESPACE_ID != ''
        run: npx wrangler deploy
        working-directory: apps/worker

      - name: Deploy Admin
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.LINKETRY_API_URL != '' && env.LINKETRY_PAGES_PROJECT != ''
        run: npx wrangler pages deploy apps/admin/dist --project-name "$LINKETRY_PAGES_PROJECT" --branch main

      - name: Ensure Linketry Admin DNS
        if: env.CLOUDFLARE_API_TOKEN != '' && env.LINKETRY_ADMIN_URL != '' && env.LINKETRY_ADMIN_ZONE != '' && env.LINKETRY_PAGES_PROJECT != ''
        run: |
          node --input-type=module <<'NODE'
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const zoneName = process.env.LINKETRY_ADMIN_ZONE;
          const hostname = new URL(process.env.LINKETRY_ADMIN_URL).hostname.toLowerCase();
          const target = `${process.env.LINKETRY_PAGES_PROJECT}.pages.dev`;

          if (hostname.endsWith('.pages.dev')) {
            console.log('Admin URL already uses the Pages subdomain; no DNS record is required.');
            process.exit(0);
          }

          async function cloudflare(path, init = {}) {
            const response = await fetch(`https://api.cloudflare.com/client/v4${path}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${token}`,
                'Content-Type': 'application/json',
                ...init.headers,
              },
            });
            const body = await response.json();
            if (!response.ok || !body.success) {
              const errors = body.errors?.map((error) => error.message).join('; ') || response.statusText;
              throw new Error(`Cloudflare API request failed: ${errors}`);
            }
            return body.result;
          }

          const zones = await cloudflare(`/zones?name=${encodeURIComponent(zoneName)}`);
          if (zones.length !== 1) {
            throw new Error(`Expected one Cloudflare zone named ${zoneName}, found ${zones.length}.`);
          }

          const zoneId = zones[0].id;
          const records = await cloudflare(
            `/zones/${zoneId}/dns_records?name=${encodeURIComponent(hostname)}`
          );
          const existing = records.find((record) => record.name === hostname);
          const payload = JSON.stringify({
            type: 'CNAME',
            name: hostname,
            content: target,
            ttl: 1,
            proxied: true,
          });

          if (existing) {
            await cloudflare(`/zones/${zoneId}/dns_records/${existing.id}`, {
              method: 'PUT',
              body: payload,
            });
            console.log(`Updated ${hostname} to ${target}.`);
          } else {
            await cloudflare(`/zones/${zoneId}/dns_records`, {
              method: 'POST',
              body: payload,
            });
            console.log(`Created ${hostname} pointing to ${target}.`);
          }
          NODE

      - name: Write deployment access summary
        if: always()
        run: |
          ADMIN_URL="$LINKETRY_ADMIN_URL"
          if [ -z "$ADMIN_URL" ] && [ -n "$LINKETRY_PAGES_PROJECT" ]; then
            ADMIN_URL="https://${LINKETRY_PAGES_PROJECT}.pages.dev"
          fi
          {
            echo "## Linketry access"
            echo ""
            echo "| Role | URL |"
            echo "|---|---|"
            echo "| Admin dashboard | ${ADMIN_URL:-Not configured — recommended: https://admin.example.com} |"
            echo "| Worker API and short links | ${LINKETRY_API_URL:-Not configured — recommended: https://go.example.com} |"
            echo ""
            echo "### LINKETRY_ADMIN_TOKEN"
            if [ "$LINKETRY_ADMIN_TOKEN_SOURCE" = "generated" ]; then
              echo "A token was generated automatically during this first deployment. Open the **Ensure LINKETRY_ADMIN_TOKEN secret** step log, copy the one-time token, and save it in a password manager. Later deployments preserve the existing Worker secret."
            elif [ "$LINKETRY_ADMIN_TOKEN_SOURCE" = "preserved" ]; then
              echo "The existing automatically generated Worker token was preserved. Use the value saved from the first deployment. If it was lost, set a new repository secret named **LINKETRY_ADMIN_TOKEN** and rerun deployment once to replace it."
            elif [ "$LINKETRY_ADMIN_TOKEN_SOURCE" = "configured" ]; then
              echo "The optional repository secret **LINKETRY_ADMIN_TOKEN** replaced the Worker token for recovery. Use the original value you saved; GitHub cannot display it later."
            else
              echo "The token step did not run. Configure Cloudflare credentials, then rerun deployment."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Skip Cloudflare deploy
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        run: |
          echo "Cloudflare deploy skipped because CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not configured."
          echo "Type-check and Admin build completed successfully."

      - name: Skip Worker deploy
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && (env.LINKETRY_WORKER_NAME == '' || env.RESOLVED_WORKER_DOMAINS == '' || env.LINKETRY_D1_DATABASE_NAME == '' || env.LINKETRY_D1_DATABASE_ID == '' || env.LINKETRY_KV_NAMESPACE_ID == '')
        run: |
          echo "Worker deploy skipped because one or more required LINKETRY_* Worker repository variables are not configured."
          echo "R2, Queue, and KV_PREVIEW_ID are optional advanced features and do not block the basic deployment."
          echo "See docs/SELF_HOSTING.md for the required variable list."

      - name: Skip Admin deploy
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && (env.LINKETRY_API_URL == '' || env.LINKETRY_PAGES_PROJECT == '')
        run: |
          echo "Admin deploy skipped because LINKETRY_API_URL or LINKETRY_PAGES_PROJECT repository variable is not configured."
          echo "Set them under GitHub repository Settings -> Secrets and variables -> Actions -> Variables."
