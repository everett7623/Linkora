name: Deploy Linkora

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-linkora
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
      LINKORA_API_URL: ${{ vars.LINKORA_API_URL }}
      LINKORA_PAGES_PROJECT: ${{ vars.LINKORA_PAGES_PROJECT }}
      LINKORA_WORKER_NAME: ${{ vars.LINKORA_WORKER_NAME }}
      LINKORA_WORKER_DOMAINS: ${{ vars.LINKORA_WORKER_DOMAINS }}
      LINKORA_SHORT_DOMAIN: ${{ vars.LINKORA_SHORT_DOMAIN }}
      LINKORA_COMPATIBILITY_DATE: ${{ vars.LINKORA_COMPATIBILITY_DATE }}
      LINKORA_D1_DATABASE_NAME: ${{ vars.LINKORA_D1_DATABASE_NAME }}
      LINKORA_D1_DATABASE_ID: ${{ vars.LINKORA_D1_DATABASE_ID }}
      LINKORA_KV_NAMESPACE_ID: ${{ vars.LINKORA_KV_NAMESPACE_ID }}
      LINKORA_KV_PREVIEW_ID: ${{ vars.LINKORA_KV_PREVIEW_ID }}
      LINKORA_R2_BUCKET: ${{ vars.LINKORA_R2_BUCKET }}
      LINKORA_R2_PREVIEW_BUCKET: ${{ vars.LINKORA_R2_PREVIEW_BUCKET }}
      LINKORA_VISITS_QUEUE: ${{ vars.LINKORA_VISITS_QUEUE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Linkora version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "RESOLVED_LINKORA_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"
          echo "Linkora version: $PACKAGE_VERSION"

      - name: Resolve Worker domains
        run: |
          RESOLVED_WORKER_DOMAINS="$(node <<'NODE'
          const source = process.env.LINKORA_WORKER_DOMAINS || process.env.LINKORA_SHORT_DOMAIN || '';
          const domains = [...new Set(source.split(',').map((value) => value.trim().toLowerCase()).filter(Boolean))];
          process.stdout.write(domains.join(','));
          NODE
          )"
          echo "RESOLVED_WORKER_DOMAINS=${RESOLVED_WORKER_DOMAINS}" >> "$GITHUB_ENV"

      - name: Type-check Worker
        run: npm run type-check --workspace=apps/worker

      - name: Test Admin unit rules
        run: npm run test:unit --workspace=apps/admin

      - name: Test Worker public pages and redirects
        run: npm run test --workspace=apps/worker

      - name: Build Admin
        run: npm run build --workspace=apps/admin
        env:
          VITE_API_URL: ${{ env.LINKORA_API_URL }}

      - name: Generate Worker config
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.LINKORA_WORKER_NAME != '' && env.RESOLVED_WORKER_DOMAINS != '' && env.LINKORA_D1_DATABASE_NAME != '' && env.LINKORA_D1_DATABASE_ID != '' && env.LINKORA_KV_NAMESPACE_ID != ''
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const env = process.env;
          const domains = env.RESOLVED_WORKER_DOMAINS.split(',').filter(Boolean);
          const routeLines = domains
            .map((domain) => `  { pattern = "${domain}", custom_domain = true }`)
            .join(',\n');
          const optionalConfig = [];
          if (env.LINKORA_R2_BUCKET && env.LINKORA_R2_PREVIEW_BUCKET) {
            optionalConfig.push(
              '[[r2_buckets]]',
              'binding = "BACKUPS"',
              `bucket_name = "${env.LINKORA_R2_BUCKET}"`,
              `preview_bucket_name = "${env.LINKORA_R2_PREVIEW_BUCKET}"`,
              ''
            );
          }
          if (env.LINKORA_VISITS_QUEUE) {
            optionalConfig.push(
              '[[queues.producers]]',
              'binding = "VISITS_QUEUE"',
              `queue = "${env.LINKORA_VISITS_QUEUE}"`,
              '',
              '[[queues.consumers]]',
              `queue = "${env.LINKORA_VISITS_QUEUE}"`,
              'max_batch_size = 10',
              'max_batch_timeout = 5',
              ''
            );
          }
          optionalConfig.push('[triggers]', 'crons = ["0 18 * * *"]', '');
          const kvNamespaces = [
            '[[kv_namespaces]]',
            'binding = "KV"',
            `id = "${env.LINKORA_KV_NAMESPACE_ID}"`,
          ];
          if (env.LINKORA_KV_PREVIEW_ID) {
            kvNamespaces.push(`preview_id = "${env.LINKORA_KV_PREVIEW_ID}"`);
          }
          const config = [
            `name = "${env.LINKORA_WORKER_NAME}"`,
            'main = "src/index.ts"',
            `compatibility_date = "${env.LINKORA_COMPATIBILITY_DATE || '2026-07-08'}"`,
            'compatibility_flags = ["nodejs_compat"]',
            'routes = [',
            routeLines,
            ']',
            '',
            '[vars]',
            `LINKORA_VERSION = "${env.RESOLVED_LINKORA_VERSION || '0.9.10'}"`,
            '',
            '[[d1_databases]]',
            'binding = "DB"',
            `database_name = "${env.LINKORA_D1_DATABASE_NAME}"`,
            `database_id = "${env.LINKORA_D1_DATABASE_ID}"`,
            'migrations_dir = "../../migrations"',
            '',
            ...kvNamespaces,
            '',
            ...optionalConfig,
          ].join('\n');

          fs.writeFileSync('apps/worker/wrangler.toml', config);
          NODE

      - name: Ensure ADMIN_TOKEN secret
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.LINKORA_WORKER_NAME != ''
        run: |
          if [ -n "$ADMIN_TOKEN" ]; then
            echo "Using ADMIN_TOKEN from GitHub repository secrets."
            printf '%s' "$ADMIN_TOKEN" | npx wrangler secret put ADMIN_TOKEN
          else
            echo "No ADMIN_TOKEN repository secret found; generating a new one."
            GENERATED_TOKEN="linkora_$(openssl rand -hex 32)"
            printf '%s' "$GENERATED_TOKEN" | npx wrangler secret put ADMIN_TOKEN
            echo ""
            echo "============================================================"
            echo "Generated ADMIN_TOKEN: $GENERATED_TOKEN"
            echo "============================================================"
            echo "Save this token and add it to GitHub repository secrets as ADMIN_TOKEN"
            echo "so future deployments keep the same token."
            echo ""
          fi
        working-directory: apps/worker

      - name: Apply D1 migrations
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.LINKORA_WORKER_NAME != '' && env.RESOLVED_WORKER_DOMAINS != '' && env.LINKORA_D1_DATABASE_NAME != '' && env.LINKORA_D1_DATABASE_ID != '' && env.LINKORA_KV_NAMESPACE_ID != ''
        run: npx wrangler d1 migrations apply "$LINKORA_D1_DATABASE_NAME" --remote
        working-directory: apps/worker

      - name: Deploy Worker
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.LINKORA_WORKER_NAME != '' && env.RESOLVED_WORKER_DOMAINS != '' && env.LINKORA_D1_DATABASE_NAME != '' && env.LINKORA_D1_DATABASE_ID != '' && env.LINKORA_KV_NAMESPACE_ID != ''
        run: npx wrangler deploy
        working-directory: apps/worker

      - name: Deploy Admin
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.LINKORA_API_URL != '' && env.LINKORA_PAGES_PROJECT != ''
        run: npx wrangler pages deploy apps/admin/dist --project-name "$LINKORA_PAGES_PROJECT" --branch main

      - name: Skip Cloudflare deploy
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        run: |
          echo "Cloudflare deploy skipped because CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not configured."
          echo "Type-check and Admin build completed successfully."

      - name: Skip Worker deploy
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && (env.LINKORA_WORKER_NAME == '' || env.RESOLVED_WORKER_DOMAINS == '' || env.LINKORA_D1_DATABASE_NAME == '' || env.LINKORA_D1_DATABASE_ID == '' || env.LINKORA_KV_NAMESPACE_ID == '')
        run: |
          echo "Worker deploy skipped because one or more required LINKORA_* Worker repository variables are not configured."
          echo "R2, Queue, and KV_PREVIEW_ID are optional advanced features and do not block the basic deployment."
          echo "See docs/SELF_HOSTING.md for the required variable list."

      - name: Skip Admin deploy
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && (env.LINKORA_API_URL == '' || env.LINKORA_PAGES_PROJECT == '')
        run: |
          echo "Admin deploy skipped because LINKORA_API_URL or LINKORA_PAGES_PROJECT repository variable is not configured."
          echo "Set them under GitHub repository Settings -> Secrets and variables -> Actions -> Variables."
