name: Deploy Isolated Linketry Demo

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY LINKETRY DEMO to continue
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-linketry-demo
  cancel-in-progress: false

jobs:
  deploy-demo:
    name: Deploy isolated Demo
    runs-on: ubuntu-latest
    environment: linketry-demo
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.LINKETRY_DEMO_CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.LINKETRY_DEMO_CLOUDFLARE_ACCOUNT_ID }}
      LINKETRY_ADMIN_TOKEN_OVERRIDE: ${{ secrets.LINKETRY_DEMO_ADMIN_TOKEN }}
      LINKETRY_WORKER_NAME: ${{ vars.LINKETRY_DEMO_WORKER_NAME }}
      LINKETRY_WORKER_DOMAINS: ${{ vars.LINKETRY_DEMO_WORKER_DOMAINS }}
      LINKETRY_DEMO_USE_WORKERS_DEV: ${{ vars.LINKETRY_DEMO_USE_WORKERS_DEV }}
      LINKETRY_DEMO_ACCESS_CODE: ${{ vars.LINKETRY_DEMO_ACCESS_CODE }}
      LINKETRY_API_URL: ${{ vars.LINKETRY_DEMO_API_URL }}
      LINKETRY_API_ORIGIN_URL: ${{ vars.LINKETRY_DEMO_API_ORIGIN_URL || vars.LINKETRY_DEMO_API_URL }}
      LINKETRY_API_PAGES_PROJECT: ${{ vars.LINKETRY_DEMO_API_PAGES_PROJECT || 'linketry-demo-api' }}
      LINKETRY_API_CUSTOM_DOMAIN: ${{ vars.LINKETRY_DEMO_API_CUSTOM_DOMAIN || 'demoapi.linketry.com' }}
      LINKETRY_ADMIN_URL: ${{ vars.LINKETRY_DEMO_ADMIN_URL }}
      LINKETRY_PAGES_PROJECT: ${{ vars.LINKETRY_DEMO_PAGES_PROJECT }}
      LINKETRY_D1_DATABASE_NAME: ${{ vars.LINKETRY_DEMO_D1_DATABASE_NAME }}
      LINKETRY_D1_DATABASE_ID: ${{ vars.LINKETRY_DEMO_D1_DATABASE_ID }}
      LINKETRY_KV_NAMESPACE_ID: ${{ vars.LINKETRY_DEMO_KV_NAMESPACE_ID }}
      LINKETRY_KV_PREVIEW_ID: ${{ vars.LINKETRY_DEMO_KV_PREVIEW_ID }}
      LINKETRY_R2_BUCKET: ${{ vars.LINKETRY_DEMO_R2_BUCKET }}
      LINKETRY_R2_PREVIEW_BUCKET: ${{ vars.LINKETRY_DEMO_R2_PREVIEW_BUCKET }}
      LINKETRY_VISITS_QUEUE: ${{ vars.LINKETRY_DEMO_VISITS_QUEUE }}
      LINKETRY_COMPATIBILITY_DATE: ${{ vars.LINKETRY_DEMO_COMPATIBILITY_DATE }}
      LINKETRY_DEMO_DEPLOY_CONFIRMATION: ${{ inputs.confirmation }}
      LINKETRY_DEMO_CREDENTIAL_SCOPE_CONFIRMED: ${{ vars.LINKETRY_DEMO_CREDENTIAL_SCOPE_CONFIRMED }}
      LINKETRY_DEMO_ISOLATION_CONFIRMED: ${{ vars.LINKETRY_DEMO_ISOLATION_CONFIRMED }}
      LINKETRY_DEMO_SYNTHETIC_DATA_ONLY: ${{ vars.LINKETRY_DEMO_SYNTHETIC_DATA_ONLY }}
      LINKETRY_DEMO_APPROVED_RELEASE: ${{ vars.LINKETRY_DEMO_APPROVED_RELEASE }}
      LINKETRY_DEMO_APPROVED_COMMIT: ${{ vars.LINKETRY_DEMO_APPROVED_COMMIT }}
      LINKETRY_DEMO_APPROVED_MIGRATIONS_SHA256: ${{ vars.LINKETRY_DEMO_APPROVED_MIGRATIONS_SHA256 }}
      LINKETRY_PROTECTED_ACCOUNT_IDS: ${{ vars.LINKETRY_PROTECTED_ACCOUNT_IDS }}
      LINKETRY_PROTECTED_RESOURCE_IDS: ${{ vars.LINKETRY_PROTECTED_RESOURCE_IDS }}
      LINKETRY_PROTECTED_RESOURCE_NAMES: ${{ vars.LINKETRY_PROTECTED_RESOURCE_NAMES }}
      LINKETRY_PROTECTED_DOMAINS: ${{ vars.LINKETRY_PROTECTED_DOMAINS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Linketry version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "RESOLVED_LINKETRY_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"
          echo "Linketry Demo version: $PACKAGE_VERSION"

      - name: Test deployment policies
        run: npm run test:deployment

      - name: Type-check Worker
        run: npm run type-check --workspace=apps/worker

      - name: Test Worker
        run: npm run test --workspace=apps/worker

      - name: Test Admin unit rules
        run: npm run test:unit --workspace=apps/admin

      - name: Test isolated Demo API gateway
        run: npm run test --workspace=apps/demo-api

      - name: Build isolated Demo Admin
        run: npm run build --workspace=apps/admin
        env:
          VITE_LINKETRY_API_URL: ${{ env.LINKETRY_API_URL }}
          VITE_LINKETRY_DEMO_MODE: 'true'
          VITE_LINKETRY_DEMO_ACCESS_CODE: ${{ env.LINKETRY_DEMO_ACCESS_CODE || 'LinketryDemo' }}

      - name: Generate isolated Demo Worker config
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const env = process.env;
          const domains = [...new Set(
            (env.LINKETRY_WORKER_DOMAINS || '')
              .split(',')
              .map((value) => value.trim().toLowerCase())
              .filter(Boolean)
          )];
          const routes = domains
            .map((domain) => `  { pattern = "${domain}", custom_domain = true }`)
            .join(',\n');
          const routing = env.LINKETRY_DEMO_USE_WORKERS_DEV === 'true'
            ? ['workers_dev = true']
            : ['routes = [', routes, ']'];
          const kv = [
            '[[kv_namespaces]]',
            'binding = "KV"',
            `id = "${env.LINKETRY_KV_NAMESPACE_ID || ''}"`,
          ];
          if (env.LINKETRY_KV_PREVIEW_ID) {
            kv.push(`preview_id = "${env.LINKETRY_KV_PREVIEW_ID}"`);
          }
          const optionalConfig = [];
          if (env.LINKETRY_R2_BUCKET && env.LINKETRY_R2_PREVIEW_BUCKET) {
            optionalConfig.push(
              '[[r2_buckets]]',
              'binding = "BACKUPS"',
              `bucket_name = "${env.LINKETRY_R2_BUCKET}"`,
              `preview_bucket_name = "${env.LINKETRY_R2_PREVIEW_BUCKET}"`,
              ''
            );
          }
          if (env.LINKETRY_VISITS_QUEUE) {
            optionalConfig.push(
              '[[queues.producers]]',
              'binding = "VISITS_QUEUE"',
              `queue = "${env.LINKETRY_VISITS_QUEUE}"`,
              '',
              '[[queues.consumers]]',
              `queue = "${env.LINKETRY_VISITS_QUEUE}"`,
              'max_batch_size = 10',
              'max_batch_timeout = 5',
              ''
            );
          }
          optionalConfig.push(
            '[triggers]',
            'crons = ["15 3 * * *", "15 * * * *"]',
            ''
          );
          const config = [
            `name = "${env.LINKETRY_WORKER_NAME || ''}"`,
            'main = "src/index.ts"',
            `compatibility_date = "${env.LINKETRY_COMPATIBILITY_DATE || '2026-07-16'}"`,
            'compatibility_flags = ["nodejs_compat"]',
            ...routing,
            '',
            '[vars]',
            `LINKETRY_VERSION = "${env.RESOLVED_LINKETRY_VERSION || '0.27.7'}"`,
            'LINKETRY_DEMO_MODE = "read-only"',
            'LINKETRY_DAILY_CRON = "15 3 * * *"',
            'LINKETRY_HEALTH_CRON = "15 * * * *"',
            '',
            '[[ratelimits]]',
            'name = "DEMO_RATE_LIMITER"',
            'namespace_id = "1001"',
            '  [ratelimits.simple]',
            '  limit = 120',
            '  period = 60',
            '',
            '[[d1_databases]]',
            'binding = "DB"',
            `database_name = "${env.LINKETRY_D1_DATABASE_NAME || ''}"`,
            `database_id = "${env.LINKETRY_D1_DATABASE_ID || ''}"`,
            'migrations_dir = "../../migrations"',
            '',
            ...kv,
            '',
            ...optionalConfig,
          ].join('\n');

          fs.writeFileSync('apps/worker/wrangler.demo.toml', config);
          NODE

      - name: Generate isolated Demo API gateway config
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const config = {
            $schema: '../../node_modules/wrangler/config-schema.json',
            name: process.env.LINKETRY_API_PAGES_PROJECT || '',
            pages_build_output_dir: './public',
            compatibility_date: process.env.LINKETRY_COMPATIBILITY_DATE || '2026-07-16',
            services: [
              {
                binding: 'DEMO_API',
                service: process.env.LINKETRY_WORKER_NAME || '',
              },
            ],
          };

          fs.writeFileSync('apps/demo-api/wrangler.jsonc', `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Enforce isolated Demo safety gate
        run: npm run deploy:demo:gate

      - name: Ensure isolated Demo API Pages project
        run: |
          inventory="$(npx wrangler pages project list --json)"
          if ! printf '%s' "$inventory" |
            node scripts/pages-project-inventory.mjs --has "$LINKETRY_API_PAGES_PROJECT"; then
            npx wrangler pages project create "$LINKETRY_API_PAGES_PROJECT" \
              --production-branch main \
              --compatibility-date "${LINKETRY_COMPATIBILITY_DATE:-2026-07-16}"
          fi

      - name: Ensure isolated Demo advanced resources
        run: |
          ensure_r2_bucket() {
            local name="$1"
            local inventory
            inventory="$(npx wrangler r2 bucket list)"
            if ! printf '%s' "$inventory" | node -e '
              let body = "";
              process.stdin.on("data", (chunk) => body += chunk);
              process.stdin.on("end", () => {
                const name = process.argv[1];
                const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
                const exactCell = new RegExp(`(?:^|[^A-Za-z0-9_-])${escaped}(?:$|[^A-Za-z0-9_-])`, "m");
                process.exit(exactCell.test(body) ? 0 : 1);
              });
            ' "$name"; then
              npx wrangler r2 bucket create "$name"
            fi
          }

          ensure_queue() {
            local name="$1"
            local inventory
            inventory="$(npx wrangler queues list)"
            if ! printf '%s' "$inventory" | node -e '
              let body = "";
              process.stdin.on("data", (chunk) => body += chunk);
              process.stdin.on("end", () => {
                const name = process.argv[1];
                const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
                const exactCell = new RegExp(`(?:^|[^A-Za-z0-9_-])${escaped}(?:$|[^A-Za-z0-9_-])`, "m");
                process.exit(exactCell.test(body) ? 0 : 1);
              });
            ' "$name"; then
              npx wrangler queues create "$name" --message-retention-period-secs 60
            fi
          }

          if [[ -n "$LINKETRY_R2_BUCKET" && -n "$LINKETRY_R2_PREVIEW_BUCKET" ]]; then
            ensure_r2_bucket "$LINKETRY_R2_BUCKET"
            ensure_r2_bucket "$LINKETRY_R2_PREVIEW_BUCKET"
          fi
          if [[ -n "$LINKETRY_VISITS_QUEUE" ]]; then
            ensure_queue "$LINKETRY_VISITS_QUEUE"
          fi

      - name: Set isolated Demo Admin token
        run: |
          printf '%s' "$LINKETRY_ADMIN_TOKEN_OVERRIDE" |
            npx wrangler secret put LINKETRY_ADMIN_TOKEN --config wrangler.demo.toml
        working-directory: apps/worker

      - name: Apply isolated Demo migrations
        run: |
          npx wrangler d1 migrations apply "$LINKETRY_D1_DATABASE_NAME" \
            --remote \
            --config wrangler.demo.toml
        working-directory: apps/worker

      - name: Generate isolated synthetic Demo data
        run: |
          node scripts/demo-seed.mjs \
            --origin "$LINKETRY_API_ORIGIN_URL" \
            --output "$RUNNER_TEMP/linketry-demo-seed.sql" \
            --artifact-dir "$RUNNER_TEMP/linketry-demo-artifacts" \
            --version "$RESOLVED_LINKETRY_VERSION"
          node scripts/demo-feature-seed.mjs \
            --output "$RUNNER_TEMP/linketry-demo-feature-seed.sql"

      - name: Seed isolated synthetic Demo data
        run: |
          npx wrangler d1 execute "$LINKETRY_D1_DATABASE_NAME" \
            --remote \
            --config wrangler.demo.toml \
            --file "$RUNNER_TEMP/linketry-demo-seed.sql"
        working-directory: apps/worker

      - name: Seed synthetic Demo feature settings
        run: |
          npx wrangler d1 execute "$LINKETRY_D1_DATABASE_NAME" \
            --remote \
            --config wrangler.demo.toml \
            --file "$RUNNER_TEMP/linketry-demo-feature-seed.sql"
        working-directory: apps/worker

      - name: Upload isolated synthetic Demo artifacts
        if: env.LINKETRY_R2_BUCKET != '' && env.LINKETRY_R2_PREVIEW_BUCKET != ''
        run: |
          npx wrangler r2 object put "$LINKETRY_R2_BUCKET/backups/linketry-demo-snapshot.json" \
            --remote \
            --config wrangler.demo.toml \
            --file "$RUNNER_TEMP/linketry-demo-artifacts/backup-latest.json" \
            --content-type "application/json; charset=utf-8"
          npx wrangler r2 object put "$LINKETRY_R2_BUCKET/backups/linketry-demo-pre-release.json" \
            --remote \
            --config wrangler.demo.toml \
            --file "$RUNNER_TEMP/linketry-demo-artifacts/backup-previous.json" \
            --content-type "application/json; charset=utf-8"
          npx wrangler r2 object put "$LINKETRY_R2_BUCKET/reports/linketry-demo-analytics.csv" \
            --remote \
            --config wrangler.demo.toml \
            --file "$RUNNER_TEMP/linketry-demo-artifacts/analytics-report.csv" \
            --content-type "text/csv; charset=utf-8"
        working-directory: apps/worker

      - name: Deploy isolated Demo Worker
        run: npx wrangler deploy --config wrangler.demo.toml --strict
        working-directory: apps/worker

      - name: Deploy isolated Demo API gateway
        run: |
          npx wrangler pages deploy public \
            --cwd apps/demo-api \
            --project-name "$LINKETRY_API_PAGES_PROJECT" \
            --branch main \
            --commit-hash "$GITHUB_SHA"

      - name: Register isolated Demo API custom domain
        run: |
          node scripts/cloudflare-pages-domain.mjs \
            --account-id "$CLOUDFLARE_ACCOUNT_ID" \
            --project "$LINKETRY_API_PAGES_PROJECT" \
            --domain "$LINKETRY_API_CUSTOM_DOMAIN"

      - name: Deploy isolated Demo Admin
        run: |
          npx wrangler pages deploy apps/admin/dist \
            --project-name "$LINKETRY_PAGES_PROJECT" \
            --branch main

      - name: Verify isolated Demo API gateway
        run: |
          node scripts/demo-live-smoke.mjs \
            --admin-url "${LINKETRY_ADMIN_URL:-https://${LINKETRY_PAGES_PROJECT}.pages.dev}" \
            --api-url "https://${LINKETRY_API_PAGES_PROJECT}.pages.dev" \
            --version "$RESOLVED_LINKETRY_VERSION"

      - name: Verify Demo production parity
        run: |
          node scripts/demo-live-smoke.mjs \
            --admin-url "${LINKETRY_ADMIN_URL:-https://${LINKETRY_PAGES_PROJECT}.pages.dev}" \
            --api-url "$LINKETRY_API_URL" \
            --version "$RESOLVED_LINKETRY_VERSION"

      - name: Write isolated Demo summary
        if: always()
        run: |
          {
            echo "## Isolated Linketry Demo"
            echo ""
            echo "| Role | Target |"
            echo "|---|---|"
            echo "| Admin | ${LINKETRY_ADMIN_URL:-https://${LINKETRY_PAGES_PROJECT}.pages.dev} |"
            echo "| Public API | ${LINKETRY_API_URL:-Not configured} |"
            echo "| API gateway | https://${LINKETRY_API_PAGES_PROJECT}.pages.dev |"
            echo "| API custom domain | ${LINKETRY_API_CUSTOM_DOMAIN:-Not configured} |"
            echo "| Worker fallback and sample redirects | ${LINKETRY_API_ORIGIN_URL:-Not configured} |"
            echo "| Worker | ${LINKETRY_WORKER_NAME:-Not configured} |"
            echo "| D1 | ${LINKETRY_D1_DATABASE_NAME:-Not configured} |"
            echo "| R2 | ${LINKETRY_R2_BUCKET:-Not configured} |"
            echo "| Queue | ${LINKETRY_VISITS_QUEUE:-Not configured} |"
            echo ""
            echo "This workflow never deploys the production project site or changes production DNS."
          } >> "$GITHUB_STEP_SUMMARY"
